# ============================================
# Redirect HTTP to HTTPS
# ============================================
server {
    listen 80;
    server_name elecciones.sigecloud.com;
    return 301 https://$server_name$request_uri;
}

# ============================================
# HTTPS Server with SSL
# ============================================
server {
    listen 443 ssl http2;
    server_name elecciones.sigecloud.com;

    # SSL Configuration (Let's Encrypt example)
    ssl_certificate /etc/letsencrypt/live/elecciones.sigecloud.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/elecciones.sigecloud.com/privkey.pem;
    
    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy to Docker Frontend (port 8090)
    location / {
        proxy_pass http://localhost:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
